# Multi-Agent Orchestration Configuration Template
#
# This YAML file defines agent roles, responsibilities, and data flow for a formal-specification-driven
# multi-agent development workflow. Use this template to configure how multiple AI agents coordinate
# around formal specifications (VDM-SL).
#
# Key Principle: Agents communicate through formal specifications (contracts), not direct code sharing.
# Each agent needs only:
#   1. Their module specification (VDM-SL)
#   2. Dependency module interface specifications (postconditions → preconditions)
#   3. Relevant phase-specific prompts (phase1-4)

---
# Metadata about this orchestration setup
orchestration:
  name: "Formal Specification Driven Development"
  version: "1.0"
  created_date: "2024-01-01"
  description: "Multi-agent workflow where formal specs (VDM-SL) serve as contracts between modules"

  # Phases: each phase has specific agents and outputs
  # Phase 1: Domain Expert + Architect Agent → VDM-SL specification + @ext annotations + module decomposition
  # Phase 2-4: Fully AI-autonomous → Independent development with formal contracts
  #
  # Human Role: Domain expert ONLY (Phase 1). Humans define business rules and
  # non-functional requirements; all technology decisions are made by AI agents.
  phases:
    phase1:
      name: "Domain Specification"
      duration_estimate: "1-3 days"
      stakeholders: ["domain_expert", "architect_agent"]
      focus: "Define business rules (VDM-SL) and non-functional requirements (@ext annotations) through domain expert dialogue"

    phase2:
      name: "Technical Design (AI-Autonomous)"
      duration_estimate: "1-2 days per module"
      stakeholders: ["module_agent"]
      focus: "AI selects technology stack, designs architecture, maps domain structure to implementation structure"
      autonomous: true
      note: "Technology selection (language, framework, DB, infrastructure) is 100% AI decision based on VDM-SL + @ext"

    phase3:
      name: "Implementation (AI-Autonomous)"
      duration_estimate: "2-5 days per module"
      stakeholders: ["module_agent", "integration_agent"]
      focus: "Generate code from specifications, self-test against spec"
      autonomous: true

    phase4:
      name: "Integration & Verification (AI-Autonomous)"
      duration_estimate: "1-2 days"
      stakeholders: ["integration_agent"]
      focus: "Verify composability (A.post ⇒ B.pre), cross-module contracts"
      autonomous: true

---
# AGENT DEFINITIONS
agents:

  # ==== ARCHITECT AGENT (Phase 1) ====
  architect_agent:
    id: "architect"
    role: "Formal Specification Architect"
    phase: 1
    interaction_model: "Domain expert dialogue"

    description: |
      Elicits requirements from domain experts through structured dialogue.
      Produces formal VDM-SL specifications with @ext annotations that define:
      - System types and invariants (business rules) — VDM-SL
      - Non-functional requirements (performance, usability, etc.) — @ext annotations
      - Module boundaries and responsibilities
      - Inter-module contracts (interfaces)

      The human participant is a DOMAIN EXPERT, not a technology decision-maker.
      This agent translates domain knowledge into formal notation.
      Technology decisions (language, framework, DB) are NOT made in this phase.

    # What inputs does this agent need?
    context_requirements:
      - domain_expert_knowledge: "Domain expert's understanding of business rules and requirements"
      - non_functional_expectations: "Performance, usability, availability, compliance needs (captured as @ext)"
      - existing_systems: "Existing systems, legacy integrations (if any)"
      - success_criteria: "How will we measure if this is correct?"

    # What outputs does this agent produce?
    outputs:
      - system_spec_vdmsl: "Complete VDM-SL specification with @ext annotations"
      - ext_annotations: "@ext annotations for non-functional requirements (performance, usability, availability, security, compliance, scalability, cost, observability, accessibility, i18n, data, integration, domain, ux)"
      - module_decomposition: "List of modules, boundaries, and responsibilities (domain-level)"
      - interface_contracts: "Pre/post conditions for each module's public operations"
      - assumptions_and_decisions: "Rationale for domain-level design choices"

    # Constraints and safeguards
    constraints:
      - must_use_vdmsl: "Output must be syntactically valid VDM-SL (machine-checkable)"
      - must_use_ext_annotations: "All non-functional requirements must be captured as @ext annotations in VDM-SL comments"
      - no_implementation_details: "Specs describe WHAT, not HOW (no algorithms, no technology choices)"
      - no_technology_decisions: "Never mention specific languages, frameworks, or databases in Phase 1"
      - explicit_invariants: "All business rules must be captured in type invariants"
      - composability_focus: "Design interfaces so A.postcond ⇒ B.precond is verifiable"

    # What prompts guide this agent?
    prompts:
      - system: "templates/prompts/phase1-specification.md"
        role: "Formal specification architect"
        instructions: "Dialogue with domain expert to build formal spec + @ext annotations"

    # Success metrics
    acceptance_criteria:
      - vdmsl_parses: "Generated VDM-SL is syntactically valid"
      - ext_coverage: "All non-functional requirements captured as @ext annotations with measurable criteria"
      - completeness: "All module interfaces fully specified"
      - clarity: "Domain expert confirms spec matches business intent"
      - no_ambiguity: "Pre/post conditions are precise, not vague"
      - no_technology_leak: "No technology-specific decisions appear in Phase 1 output"

    # Human checkpoints in Phase 1 are INTENTIONAL — the domain expert
    # must confirm that specs accurately reflect business rules.
    human_checkpoints:
      - after_domain_types: "Domain expert reviews proposed types and invariants"
      - after_module_boundaries: "Domain expert confirms module decomposition matches business domains"
      - after_interface_contracts: "Domain expert verifies contracts between modules reflect real business flows"
      - after_ext_annotations: "Domain expert confirms non-functional requirements are correctly quantified"
      - final_approval: "Domain expert signs off on complete specification"

  # ==== MODULE AGENT TEMPLATE (Phase 2-4, one per module) ====
  module_agent_template:
    id: "module_{{ module_name }}"
    role: "Module Design & Implementation Agent"
    phases: [2, 3, 4]
    interaction_model: "Fully AI-autonomous"

    description: |
      Fully autonomous AI agent that develops a single module based on:
      1. Its own module specification (VDM-SL + @ext annotations from Phase 1)
      2. Interface specifications of dependent modules

      Phase 2 (Design): AI autonomously selects technology stack (language, framework, DB),
      designs architecture, and maps domain-level VDM-SL structure to optimal implementation
      structure. VDM-SL operations and modules are domain-level abstractions — they do NOT
      need to map 1:1 to code-level functions, classes, or services.

      Phase 3 (Implementation): AI generates code, tests, and documentation.
      Phase 4 (Verification): AI verifies spec compliance and contract composability.

      Key: This agent only needs its own spec + dependency interface specs.
      It does NOT need to know about other modules' internal implementation.
      It does NOT need human input for technology decisions.

    # Template variables (fill these in when instantiating for a real module)
    module_specifics:
      module_name: "{{ e.g., order, inventory, payment }}"
      vdmsl_spec_file: "templates/.vdm/{{ module_name }}-module.vdmsl"

    # What inputs does this agent need?
    context_requirements:
      - own_module_spec: "This module's complete VDM-SL specification with @ext annotations"
      - dependency_interface_specs: "Postconditions of modules this one depends on"
      - shared_data_model: "Shared types and invariants (from Phase 1)"
      # Note: No platform_constraints or team_expertise — technology selection is AI's job

    # What outputs does this agent produce?
    outputs:
      - technology_selection: "Phase 2: Language, framework, DB, infrastructure choices (driven by @ext)"
      - domain_to_impl_mapping: "Phase 2: Mapping from VDM-SL domain structure to implementation structure"
      - design_document: "Phase 2: Detailed design with architecture and operation decomposition"
      - implementation_code: "Phase 3: Source code in AI-selected language/framework"
      - unit_tests: "Phase 3: Tests derived from preconditions and postconditions"
      - verification_report: "Phase 4: Self-verification against spec"

    constraints:
      - spec_compliance: "Implementation must satisfy all pre/post conditions"
      - ext_compliance: "@ext annotations must be addressed in design (performance targets, usability criteria, etc.)"
      - composability: "Operations must respect dependency interface contracts"
      - no_side_effects: "Only interact with dependencies via formal contracts"
      - domain_impl_independence: "Domain structure (VDM-SL) need not match implementation structure"

    prompts:
      - system_phase2: "templates/prompts/phase2-design.md"
        context_for_agent: "Own module spec (VDM-SL + @ext) + dependency interface specs"

      - system_phase3: "templates/prompts/phase3-implementation.md"
        context_for_agent: "Design doc + own module spec"

      - system_phase4: "templates/prompts/phase4-verification.md"
        context_for_agent: "Implementation + own module spec + integration spec"

    acceptance_criteria:
      - spec_verified: "Code satisfies preconditions and delivers postconditions"
      - ext_satisfied: "@ext requirements addressed (performance targets, usability criteria, etc.)"
      - dependency_contracts_satisfied: "Dependencies' postconditions match this module's preconditions"
      - tests_pass: "All auto-generated tests pass"

    # TRANSITIONAL: Human checkpoints are NOT part of the intended design.
    # The goal is fully AI-autonomous Phase 2-4. These checkpoints exist only
    # because current AI capabilities may occasionally require human review.
    # They should be removed as AI reliability improves.
    human_checkpoints_transitional:
      - design_review: "TRANSITIONAL: Human may review technology selection if AI confidence is low"
      - code_review: "TRANSITIONAL: Human may review critical security or compliance code"
      - integration_readiness: "TRANSITIONAL: Human may verify before production deployment"

  # ==== INTEGRATION AGENT (Phase 4) ====
  integration_agent:
    id: "integration"
    role: "Integration & Verification Agent"
    phase: 4
    interaction_model: "Fully AI-autonomous"

    description: |
      Fully autonomous AI agent that verifies modules compose correctly.

      Primary responsibility: Verify that for every inter-module call,
      the caller's postcondition ⇒ callee's precondition.

      Also verifies that @ext annotations are satisfied across module boundaries
      (e.g., end-to-end latency budgets, cross-module availability targets).

      This is the "contract verification" step — if all modules satisfy their
      specs, and contracts verify, the system works.

    context_requirements:
      - all_module_implementations: "Code from all module agents"
      - all_module_specs: "VDM-SL specifications with @ext annotations"
      - integration_test_spec: "Formal spec for end-to-end scenarios"
      - deployment_plan: "How modules will be deployed and interact (AI-generated)"

    outputs:
      - composability_report: "Which module pairs have verified contracts"
      - ext_compliance_report: "Cross-module @ext requirement verification (latency budgets, availability, etc.)"
      - integration_tests: "End-to-end tests based on system spec"
      - deployment_checklist: "Go-no-go decision"
      - issues_log: "Any contract violations, with remediation"

    constraints:
      - no_implementation_changes: "Cannot modify module code; sends fix request to module agent"
      - focus_on_contracts: "Verify A.post ⇒ B.pre, not internal logic"
      - traceability: "Every test traces back to formal spec or @ext annotation"

    prompts:
      - system: "templates/prompts/phase4-verification.md"
        role: "Integration verification specialist"

    acceptance_criteria:
      - all_contracts_verified: "All inter-module calls satisfy contracts"
      - ext_requirements_met: "All @ext annotations satisfied (performance, availability, etc.)"
      - integration_tests_pass: "System-level scenarios work end-to-end"
      - no_surprises: "Behavior matches formal spec"

    # TRANSITIONAL: Human escalation exists only as a safety net for current AI limitations.
    human_checkpoints_transitional:
      - deployment_approval: "TRANSITIONAL: Human may review before production deployment"

---
# DATA FLOW & HANDOFF POINTS
#
# Describes how agents hand off work and what data flows between them.
# The KEY insight: agents don't hand off code, they hand off specifications.

data_flow:

  # Phase 1 → Phase 2 handoff
  # This is the ONLY handoff that involves a human (domain expert).
  # All subsequent handoffs are fully AI-to-AI.
  phase1_to_phase2:
    from: "architect_agent (with domain expert)"
    to: "module_agent_template (for each module)"
    what_is_passed:
      - system_spec_vdmsl: "Complete formal spec with @ext annotations from Phase 1"
      - ext_annotations: "@ext annotations defining non-functional requirements (performance, usability, availability, security, compliance, etc.)"
      - module_spec_extract: "Extract of spec relevant to this module (VDM-SL + @ext)"
      - interface_contracts: "Pre/post conditions for this module's operations"
      - dependency_interface_specs: "Interface specs of modules this depends on"
      - phase2_prompt: "Design prompt — module agent autonomously determines technology and architecture"
    verification:
      - "Domain expert confirms spec matches business intent (Phase 1 only)"
      - "Architect agent confirms VDM-SL is syntactically valid"
      - "Architect agent confirms all @ext annotations have measurable criteria"
    note: "VDM-SL + @ext annotations are the COMPLETE input for Phase 2. No additional human input needed."

  # Phase 2 → Phase 3 handoff (within same agent, fully autonomous)
  phase2_to_phase3:
    from: "module_agent"
    to: "module_agent (same agent, next phase)"
    what_is_passed:
      - design_document: "Detailed design from Phase 2 (including technology selection, domain→impl mapping)"
      - technology_decisions: "Selected language, framework, DB, infrastructure (AI-determined from @ext)"
      - domain_to_impl_mapping: "How VDM-SL operations map to implementation units"
      - spec: "Own module spec with @ext annotations (unchanged)"
      - phase3_prompt: "Implementation prompt with design context"
    verification:
      - "Module agent self-verifies design satisfies @ext requirements"
      # TRANSITIONAL: Human review may be inserted here until AI reliability improves

  # Phase 3 → Phase 4 handoff (fully autonomous)
  phase3_to_phase4:
    from: "module_agent (all modules)"
    to: "integration_agent"
    what_is_passed:
      - implementation_code: "Source code from all modules"
      - unit_tests: "Tests from each module"
      - spec_compliance_report: "Each module's self-verification"
      - ext_compliance_report: "Each module's @ext requirement satisfaction"
      - integration_spec: "System-level formal spec with @ext annotations"
    verification:
      - "Each module agent confirms code satisfies their spec and @ext requirements"
      - "Integration agent reviews all inputs before starting"

---
# MODULE BOUNDARIES & DECOMPOSITION
#
# Template for how to define module boundaries. Use the architect agent's output
# to fill this in for your specific system.

module_template:
  name: "{{ ModuleName }}"

  # One-line description of what this module does
  responsibility: "{{ Clear statement of what this module owns }}"

  # Module spec file (where the VDM-SL lives)
  specification_file: "specs/.vdm/{{ module_name }}-module.vdmsl"

  # What operations does this module expose?
  public_operations:
    - operation_name: "{{ e.g., create_order }}"
      precondition: "{{ From VDM-SL: what must be true before calling }}"
      postcondition: "{{ From VDM-SL: what will be true after }}"
      side_effects: "{{ What gets modified/stored }}"
      dependencies: "{{ Which other modules does this call }}"

    # Repeat for each public operation...

  # What modules does this depend on?
  dependencies:
    - module_name: "{{ e.g., inventory }}"
      calls_operations: ["{{ operation names }}"]
      used_for: "{{ Why we need this dependency }}"
      contract_verification: "Postcond of inventory ops must match our preconds"

  # What invariants must always hold in this module?
  invariants:
    - "{{ e.g., Every order must have a valid customer ID }}"
    - "{{ e.g., Order total cannot be negative }}"

  # Testing strategy for this module
  testing:
    unit_tests_derived_from: "Preconditions and postconditions of operations"
    integration_tests: "When this module calls dependencies"
    acceptance_criteria: "Code satisfies spec, contracts verify"

---
# SHARED DATA MODEL
#
# Types and invariants that span multiple modules.
# These come from Phase 1 (architect agent) and are shared with all Phase 2-4 agents.

shared_data_model:
  location: "specs/.vdm/shared-types.vdmsl"
  description: |
    Contains type definitions and invariants that multiple modules depend on.
    Examples:
    - Customer type (used by order, billing, auth modules)
    - Product type (used by inventory, order, catalog modules)
    - Money type (used by payment, billing, order modules)

  governance:
    - "Changes to shared types require architect agent + domain expert approval (Phase 1 scope)"
    - "All module agents must be notified of changes"
    - "Module agents verify their contracts still hold after changes"
    - "Technology-specific type mappings are Phase 2 concerns and do NOT require domain expert approval"

---
# CROSS-CUTTING CONCERNS
#
# Patterns that span multiple modules (error handling, logging, auth, etc.)
# Define these in Phase 1, share with all agents in Phase 2+

cross_cutting_concerns:

  error_handling:
    spec_location: "specs/.vdm/error-contract.vdmsl"
    description: "Standard error types and recovery patterns"
    shared_by: "All modules"
    defined_in_phase: 1
    used_in_phases: [2, 3, 4]

  logging:
    spec_location: "specs/.vdm/logging-contract.vdmsl"
    description: "What gets logged, when, at what level"
    shared_by: "All modules"
    defined_in_phase: 1
    used_in_phases: [2, 3, 4]

  authentication_authorization:
    spec_location: "specs/.vdm/auth-contract.vdmsl"
    description: "How auth is verified, what roles can do what"
    shared_by: "Modules that handle user data"
    defined_in_phase: 1
    used_in_phases: [2, 3, 4]

  rate_limiting:
    spec_location: "specs/.vdm/rate-limit-contract.vdmsl"
    description: "Request rate limits per user/API key"
    shared_by: "External-facing modules"
    defined_in_phase: 1
    used_in_phases: [2, 3, 4]

---
# HUMAN DECISION POINTS & ESCALATION
#
# Defines when agents should hand off to humans and what questions to ask.

human_decision_points:

  # Phase 1: Domain expert involvement is INTENTIONAL and PERMANENT.
  # The human is the source of domain knowledge — this cannot be automated.
  after_phase1_complete:
    question: "Does this specification accurately capture the business rules?"
    who_decides: "Domain expert, architect agent"
    role: "intentional"
    escalation_triggers:
      - "Spec is ambiguous or incomplete"
      - "Module decomposition doesn't match business domains"
      - "Contracts are circular or impossible to satisfy"
      - "@ext annotations lack measurable criteria"
    fallback: "Return to architect agent for clarification with domain expert"

  # Phase 2-4: Human checkpoints are TRANSITIONAL.
  # These exist only because current AI capabilities may occasionally need oversight.
  # The intended design is fully AI-autonomous Phase 2-4.
  after_phase2_per_module:
    question: "TRANSITIONAL: Does the AI's technology selection and design seem reasonable?"
    who_decides: "Module agent (autonomous); human review optional"
    role: "transitional"
    note: "This checkpoint should be eliminated as AI reliability improves"
    escalation_triggers:
      - "AI confidence in technology selection is below threshold"
      - "@ext requirements appear contradictory or infeasible"
    fallback: "Module agent re-evaluates; may request architect agent clarification on @ext"

  after_phase3_per_module:
    question: "TRANSITIONAL: Does implementation satisfy spec?"
    who_decides: "Module agent (autonomous); human review optional for critical modules"
    role: "transitional"
    note: "This checkpoint should be eliminated as AI reliability improves"
    escalation_triggers:
      - "Spec compliance cannot be self-verified"
      - "Security or compliance-critical code (@ext:security, @ext:compliance)"
    fallback: "Module agent fixes issues and re-verifies"

  after_phase4_complete:
    question: "TRANSITIONAL: Can we deploy?"
    who_decides: "Integration agent (autonomous); human review optional"
    role: "transitional"
    note: "This checkpoint should be eliminated as AI reliability improves"
    escalation_triggers:
      - "Contract verification failed somewhere"
      - "Integration tests reveal systemic issues"
      - "@ext:availability or @ext:security targets not met"
    fallback: "Identify which module needs rework; repeat Phase 3/4"

---
# TOOLING & IMPLEMENTATION
#
# Guidance on how to implement this orchestration with available tools.
# See workflow.md for detailed implementation strategies.

tooling:

  vdmsl_validation:
    tool: "Overture IDE or command-line type checker"
    purpose: "Validate that specs are syntactically correct VDM-SL"
    when: "After architect agent produces spec"

  prompt_delivery:
    tools:
      - "Claude Projects (for persistent context)"
      - "Claude API with custom orchestration script"
      - "Custom multi-turn conversation framework"
    recommendation: "Claude Projects for small teams, custom script for automation"

  specification_diff:
    tool: "Text diff tools (diff, meld, VS Code)"
    purpose: "Track changes to specs between phases"
    when: "When specs are updated between phases"

  contract_verification:
    tool: "Manual review + VDM-SL model checker (if available)"
    purpose: "Verify A.post ⇒ B.pre for each inter-module call"
    when: "Phase 4, before integration testing"

  version_control:
    tool: "Git (recommended)"
    structure: "One branch per module + main for integration"
    purpose: "Track specs and code evolution"

---
# EXAMPLE: E-COMMERCE ORDER SYSTEM
#
# Here's what this orchestration looks like for a real system (from examples/).
# Use this as a template for your own system.

example_ecommerce:
  system_name: "E-Commerce Order Processing"

  modules:
    - name: "order"
      responsibility: "Manage order creation, modification, lifecycle"
      dependencies: ["inventory", "payment"]

    - name: "inventory"
      responsibility: "Track product stock levels"
      dependencies: []

    - name: "payment"
      responsibility: "Process payments and refunds"
      dependencies: []

  # After Phase 1, architect agent produces specs for all three modules
  # + inter-module contracts, e.g.:
  #   - order.create_order postcondition ⇒ inventory.check_stock precondition
  #   - order.finalize_order postcondition ⇒ payment.charge precondition

  # Phase 2-4: Three module agents work in parallel
  #   - order agent: designs order creation flow
  #   - inventory agent: designs stock management
  #   - payment agent: designs payment processing

  # Each module agent knows only their spec + specs of modules they call
  # They don't know how those modules work internally

  # Phase 4: integration agent verifies all contracts
  #   - order → inventory contract verified
  #   - order → payment contract verified
  #   - If all contracts verified + tests pass, system is ready
